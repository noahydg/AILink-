<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AILink 成员信息查询</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --card-bg: #111827;
    --card-border: #1e293b;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.25);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-bright: #f8fafc;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --input-bg: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(16,185,129,0.04) 0%, transparent 50%);
    animation: drift 20s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-3%, 2%); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    margin-bottom: 20px;
    font-size: 28px;
    font-weight: 700;
    color: white;
    box-shadow: 0 8px 32px var(--accent-glow);
    animation: logoIn 0.6s ease-out;
  }

  @keyframes logoIn {
    from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 2px;
    margin-bottom: 6px;
    animation: fadeUp 0.6s ease-out 0.1s both;
  }

  .header p {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 300;
    animation: fadeUp 0.6s ease-out 0.2s both;
  }

  @keyframes fadeUp {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Search area */
  .search-section {
    animation: fadeUp 0.6s ease-out 0.3s both;
  }

  .search-box {
    position: relative;
    margin-bottom: 12px;
  }

  .search-box input {
    width: 100%;
    padding: 16px 20px 16px 48px;
    background: var(--input-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    color: var(--text-bright);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-box input::placeholder {
    color: var(--text-dim);
    font-weight: 300;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 32px;
    font-weight: 300;
  }

  /* Result card */
  .result-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    overflow: hidden;
    animation: cardIn 0.4s ease-out;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  @keyframes cardIn {
    from { transform: translateY(16px) scale(0.97); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .card-header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--card-border);
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .card-header-info h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 2px;
  }

  .role-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }

  .role-leader {
    background: rgba(59,130,246,0.15);
    color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.3);
  }

  .role-core {
    background: rgba(16,185,129,0.15);
    color: #34d399;
    border: 1px solid rgba(16,185,129,0.3);
  }

  .role-member {
    background: rgba(148,163,184,0.1);
    color: #94a3b8;
    border: 1px solid rgba(148,163,184,0.2);
  }

  .card-body {
    padding: 20px 24px;
  }

  .info-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .info-row:last-child {
    border-bottom: none;
  }

  .info-label {
    width: 72px;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
    flex-shrink: 0;
  }

  .info-value {
    font-size: 14px;
    color: var(--text-bright);
    font-weight: 400;
    word-break: break-all;
  }

  /* Empty / error states */
  .state-message {
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.4s ease-out;
  }

  .state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .state-message h3 {
    font-size: 16px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .state-message p {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
  }

  /* Privacy footer */
  .footer {
    margin-top: auto;
    padding: 32px 0 24px;
    text-align: center;
  }

  .privacy-note {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.15);
    border-radius: 8px;
    font-size: 12px;
    color: var(--success);
    font-weight: 400;
  }

  .footer-text {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    opacity: 0.6;
  }

  /* Phone number masking */
  .phone-masked {
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">AI</div>
    <h1>AILink 智能装备社</h1>
    <p>成员信息查询系统</p>
  </div>

  <div class="search-section">
    <div class="search-box">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="输入你的姓名查询..." autocomplete="off" />
    </div>
    <div class="hint">输入全名即可查看你的登记信息</div>
  </div>

  <div id="resultArea"></div>

  <div class="footer">
    <div class="privacy-note">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      仅显示本人信息，隐私安全
    </div>
    <div class="footer-text">AILink-智能装备社 © 2026</div>
  </div>
</div>

<script>
const members = [
  { seq: 1, name: "叶鼎格", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本1(Intl)", role: "社长", sid: "23210513206", phone: "18006560336" },
  { seq: 2, name: "李轶轩", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本7", role: "副社长", sid: "23210816152", phone: "19016806003" },
  { seq: 3, name: "许子昂", gender: "男", college: "信息工程学院", cls: "24人工智能本2", role: "技术负责", sid: "22210816096", phone: "18868734842" },
  { seq: 4, name: "徐季鸿", gender: "男", college: "金融贸易学院", cls: "24金融学本2(Intl)", role: "策划负责", sid: "24210204001", phone: "19557103475" },
  { seq: 5, name: "陈虹舟", gender: "男", college: "金融贸易学院", cls: "25国际经济与贸易本1(Intl)", role: "财务负责", sid: "25116202030", phone: "13968864169" },
  { seq: 6, name: "钟思颖", gender: "女", college: "金融贸易学院", cls: "24国际经济与贸易本2", role: "运营负责", sid: "24210209078", phone: "17367223969" },
  { seq: 7, name: "彭鹏伟", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本1", role: "宣传负责", sid: "23210802031", phone: "13695816040" },
  { seq: 8, name: "刘琼蔚", gender: "男", college: "传媒与设计艺术学院", cls: "23环境设计本1(Intl)", role: "社员", sid: "22211305211", phone: "18667509072" },
  { seq: 9, name: "高涵宇", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本1(Intl)", role: "社员", sid: "23210816157", phone: "13957383065" },
  { seq: 10, name: "王卫星", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本7", role: "社员", sid: "23210816047", phone: "19816955680" },
  { seq: 11, name: "俞俊宇", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本1(Intl)", role: "社员", sid: "23210816219", phone: "13362746524" },
  { seq: 12, name: "李浩文", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本8", role: "社员", sid: "23210816046", phone: "13385863813" },
  { seq: 13, name: "陈浩然", gender: "男", college: "信息工程学院", cls: "23计算机科学与技术本7", role: "社员", sid: "23210816038", phone: "13868332534" },
  { seq: 14, name: "陈学涛", gender: "男", college: "信息工程学院", cls: "24人工智能本2", role: "社员", sid: "24210812037", phone: "15058761253" },
  { seq: 15, name: "王薪洋", gender: "男", college: "信息工程学院", cls: "24人工智能本2", role: "社员", sid: "24210227016", phone: "13336173181" },
  { seq: 16, name: "钱晨阳", gender: "男", college: "信息工程学院", cls: "24人工智能本2", role: "社员", sid: "24210812042", phone: "18072003469" },
  { seq: 17, name: "金轶", gender: "男", college: "信息工程学院", cls: "24人工智能本2", role: "社员", sid: "24210812054", phone: "19817570556" },
  { seq: 18, name: "徐文韬", gender: "男", college: "金融贸易学院", cls: "24金融科技本2", role: "社员", sid: "24210225006", phone: "17794543221" },
  { seq: 19, name: "刘亦然", gender: "男", college: "金融贸易学院", cls: "24金融学本2(Intl)", role: "社员", sid: "24210204227", phone: "18003353065" },
  { seq: 20, name: "庄烨", gender: "男", college: "国际学院", cls: "24商务英语1(Intl)", role: "社员", sid: "24116601085", phone: "15067750357" },
  { seq: 21, name: "王子衡", gender: "男", college: "金融贸易学院", cls: "25国际金融2(Intl)", role: "社员", sid: "25116216075", phone: "13566045994" },
  { seq: 22, name: "王文卓", gender: "男", college: "金融贸易学院", cls: "25国际金融2(Intl)", role: "社员", sid: "25116216079", phone: "19555207615" },
];

const colors = [
  'linear-gradient(135deg, #3b82f6, #6366f1)',
  'linear-gradient(135deg, #10b981, #059669)',
  'linear-gradient(135deg, #f59e0b, #d97706)',
  'linear-gradient(135deg, #ef4444, #dc2626)',
  'linear-gradient(135deg, #8b5cf6, #7c3aed)',
  'linear-gradient(135deg, #ec4899, #db2777)',
  'linear-gradient(135deg, #06b6d4, #0891b2)',
];

function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function maskPhone(phone) {
  if (phone.length === 11) return phone.slice(0, 3) + '****' + phone.slice(7);
  return phone;
}

function getRoleClass(role) {
  if (role === '社长' || role === '副社长') return 'role-leader';
  if (role.includes('负责')) return 'role-core';
  return 'role-member';
}

const input = document.getElementById('searchInput');
const resultArea = document.getElementById('resultArea');

let debounceTimer;
input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 200);
});

function doSearch() {
  const query = input.value.trim();
  
  if (!query) {
    resultArea.innerHTML = `
      <div class="state-message">
        <div class="state-icon">🔍</div>
        <h3>输入姓名开始查询</h3>
        <p>请输入你的全名以查看登记信息</p>
      </div>`;
    return;
  }

  const match = members.find(m => m.name === query);

  if (!match) {
    resultArea.innerHTML = `
      <div class="state-message">
        <div class="state-icon">🤔</div>
        <h3>未找到「${query}」</h3>
        <p>请确认姓名是否正确，需输入全名</p>
      </div>`;
    return;
  }

  const m = match;
  resultArea.innerHTML = `
    <div class="result-card">
      <div class="card-header">
        <div class="avatar" style="background: ${getColor(m.name)}">${m.name.charAt(0)}</div>
        <div class="card-header-info">
          <h2>${m.name}</h2>
          <span class="role-badge ${getRoleClass(m.role)}">${m.role}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="info-row">
          <span class="info-label">序号</span>
          <span class="info-value">${m.seq}</span>
        </div>
        <div class="info-row">
          <span class="info-label">性别</span>
          <span class="info-value">${m.gender}</span>
        </div>
        <div class="info-row">
          <span class="info-label">学院</span>
          <span class="info-value">${m.college}</span>
        </div>
        <div class="info-row">
          <span class="info-label">班级</span>
          <span class="info-value">${m.cls}</span>
        </div>
        <div class="info-row">
          <span class="info-label">学号</span>
          <span class="info-value">${m.sid}</span>
        </div>
        <div class="info-row">
          <span class="info-label">手机号</span>
          <span class="info-value phone-masked">${maskPhone(m.phone)}</span>
        </div>
      </div>
    </div>`;
}

// Initial state
doSearch();
</script>

</body>
</html>
